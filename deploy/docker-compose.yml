# 服务器部署用的 docker-compose（使用你自己的 ghcr 镜像）
# 所有密码/密钥从同目录 .env 读取，请勿把真实 .env 提交到仓库。
services:
  new-api:
    image: ghcr.io/blitzball996/new-api:latest
    restart: always
    command: --log-dir /app/logs
    ports:
      - ${HOST_IP}:${WEB_HTTP_PORT}:3000
    volumes:
      - ${APP_PATH}/data:/data
      - ${APP_PATH}/logs:/app/logs
    environment:
      - SQL_DSN=root:${DB_PASSWORD}@tcp(mysql:3306)/new-api
      - REDIS_CONN_STRING=redis://redis
      - SESSION_SECRET=${SESSION_SECRET}
      - TZ=Asia/Shanghai
    depends_on:
      - redis
      - mysql
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' | awk -F: '{print $2}'" ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

  redis:
    image: redis:latest
    restart: always
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

  mysql:
    image: mysql:8.2
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: new-api
    volumes:
      - ${APP_PATH}/mysql_data:/var/lib/mysql
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

networks:
  baota_net:
    external: true
