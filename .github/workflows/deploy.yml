name: Build & Deploy (self-hosted)

# 推送到 main 自动构建镜像到 ghcr.io 并 SSH 部署到服务器。
# 也支持在 Actions 页面手动触发 (workflow_dispatch)。
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # ghcr 仓库名必须全小写
  IMAGE: ghcr.io/blitzball996/new-api

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.vars.outputs.sha }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Check out branding (private repo)
        uses: actions/checkout@v4
        with:
          repository: blitzball996/new-api-branding
          token: ${{ secrets.BRANDING_TOKEN }}
          path: branding

      - name: Resolve version & write VERSION
        id: vars
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          # Dockerfile 需要 COPY ./VERSION，写入短 sha 作为版本号
          echo "${SHA_SHORT}" > VERSION
          echo "Building VERSION=${SHA_SHORT}"

      - name: Inject Blitzball logo
        run: |
          echo "Copying Blitzball logo (Asset 4@4x-8.png)..."
          cp "branding/Asset 4@4x-8.png" web/classic/public/logo.png
          echo "Logo injected successfully"
          ls -lh web/classic/public/logo.png

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.vars.outputs.sha }}

  deploy:
    name: Deploy over SSH
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose pull new-api
            docker compose up -d new-api
            docker image prune -f
