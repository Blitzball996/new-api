name: Build & Deploy (self-hosted)

# 推送到 main 自动构建镜像到 ghcr.io 并 SSH 部署到服务器。
# 也支持在 Actions 页面手动触发 (workflow_dispatch)。
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # ghcr 仓库名必须全小写
  IMAGE: ghcr.io/blitzball996/new-api

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.vars.outputs.sha }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Check out branding (private repo)
        uses: actions/checkout@v4
        with:
          repository: blitzball996/new-api-branding
          token: ${{ secrets.BRANDING_TOKEN }}
          path: branding

      - name: Resolve version & write VERSION
        id: vars
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          # Dockerfile 需要 COPY ./VERSION，写入短 sha 作为版本号
          echo "${SHA_SHORT}" > VERSION
          echo "Building VERSION=${SHA_SHORT}"

      - name: Inject Blitzball branding
        run: |
          echo "Injecting Blitzball brand assets..."

          # 复制品牌资源
          mkdir -p web/classic/public
          cp branding/logo.png web/classic/public/logo.png
          cp branding/theme/custom.css web/classic/public/branding.css

          # 直接修改源代码,硬编码品牌信息
          # 1. 修改 utils.jsx 的默认系统名
          sed -i "s/if (!system_name) return 'New API';/if (!system_name) return 'Blitzball';/g" web/classic/src/helpers/utils.jsx

          # 2. 修改 Footer.jsx,移除 New API 链接和文档
          # 将 isDemoSiteMode && ( 改为 false && (,完全隐藏文档区块
          sed -i 's/isDemoSiteMode && (/false \&\& (/g' web/classic/src/components/layout/Footer.jsx

          # 将 "设计与开发由" 和 New API 链接替换为 Blitzball 版权
          sed -i "s/设计与开发由/© 2024 Blitzball. All rights reserved./g" web/classic/src/components/layout/Footer.jsx
          sed -i "s|https://github.com/QuantumNous/new-api|https://blitz.mom|g" web/classic/src/components/layout/Footer.jsx
          sed -i "s/>New API</>Blitzball</g" web/classic/src/components/layout/Footer.jsx

          # 3. 注入 Blitzball 主题色到全局样式
          cat >> web/classic/public/branding.css << 'EOF'

          /* Blitzball Brand Colors - Global Override */
          :root {
            --semi-color-primary: #0066FF !important;
            --semi-color-primary-hover: #0052CC !important;
            --semi-color-primary-active: #0047B3 !important;
            --semi-color-primary-light-default: rgba(0, 102, 255, 0.1) !important;
            --semi-color-primary-light-hover: rgba(0, 102, 255, 0.2) !important;
            --semi-color-primary-light-active: rgba(0, 102, 255, 0.3) !important;
          }

          /* Override button colors */
          .semi-button-primary {
            background-color: #0066FF !important;
            border-color: #0066FF !important;
          }

          .semi-button-primary:hover {
            background-color: #0052CC !important;
            border-color: #0052CC !important;
          }

          /* Override link colors */
          a.semi-link, .semi-typography-link {
            color: #0066FF !important;
          }
          EOF

          echo "Brand injection complete"
          echo "Verifying changes:"
          grep -n "return 'Blitzball'" web/classic/src/helpers/utils.jsx || echo "System name not changed"
          grep -n "Blitzball" web/classic/src/components/layout/Footer.jsx || echo "Footer not changed"
          tail -10 web/classic/public/branding.css

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy over SSH
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose pull new-api
            docker compose up -d new-api
            docker image prune -f
